name: Bump SW cache version

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump service worker cache version and index timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          # Bump CACHE_NAME in sw.js so old caches are deleted
          sed -i "s/const CACHE_NAME = 'srilanka-trip-[^']*'/const CACHE_NAME = 'srilanka-trip-${TIMESTAMP}'/" sw.js

          # Replace BUILD_TIMESTAMP placeholder in index.html so browser fetches fresh sw.js
          sed -i "s/sw\.js?v=[^'\"']*/sw.js?v=${TIMESTAMP}/" index.html

          echo "Bumped to srilanka-trip-${TIMESTAMP}"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add sw.js index.html && git commit -m "Auto-bump SW cache version [skip ci]")
          git push
